# Fly.io configuration for Vento Remote MCP Connector
# Deploy: fly launch --copy-config && fly secrets set MCP_AUTH_TOKEN=... VENTO_API_URL=... VENTO_TOKEN=... && fly deploy

app = "vento-remote-mcp"
primary_region = "eze"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  MCP_TRANSPORT = "http"
  RATE_LIMIT_ENABLED = "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE = "60"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/live"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
