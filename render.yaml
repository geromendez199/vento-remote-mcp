services:
  - type: web
    name: vento-remote-mcp
    runtime: docker
    plan: starter
    healthCheckPath: /health/live
    healthCheckInterval: 30
    healthCheckTimeout: 10
    maxInstances: 3
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_AUTH_TOKEN
        generateValue: true
      - key: VENTO_API_URL
        sync: false
      - key: VENTO_TOKEN
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: "60"
      - key: RATE_LIMIT_BURST_PER_SECOND
        value: "10"
      - key: CACHE_TTL_SECONDS
        value: "30"
      - key: OAUTH_ENABLED
        value: "true"
      - key: OAUTH_CLIENT_ID
        sync: false
      - key: OAUTH_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        value: "https://<YOUR_RENDER_URL>/auth/vento/callback"
      - key: ALLOW_DESTRUCTIVE_TOOLS
        value: "true"
      - key: CORS_ORIGINS
        value: "https://claude.ai"
